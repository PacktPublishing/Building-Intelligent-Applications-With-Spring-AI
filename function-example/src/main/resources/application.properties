# Properties defining configuration for the Stock Quotes Function example Spring Boot application.

spring.application.name=Stock Quotes App

# Ollama
spring.ai.ollama.chat.options.model=llama3.2

# Polygon
examples.app.stock-quotes.polygon.api.key=
examples.app.stock-quotes.polygon.api.base-url=https://api.polygon.io/v2
examples.app.stock-quotes.polygon.api.market-data.previous-close.uri=/aggs/ticker/{exchangeSymbol}/prev?adjusted=true

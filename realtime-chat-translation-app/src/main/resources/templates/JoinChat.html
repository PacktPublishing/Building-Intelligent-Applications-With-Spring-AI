<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
	<head>
		<title>Let's Chat</title>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<link rel="stylesheet" th:href="@{/css/joinChat.css}" href="../static/css/joinChat.css">
		<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
	</head>
	<body>
		<div class="dialog">
			<div class="dialog-header">Enter Chat</div>
			<form class="dialog-body" method="POST" th:attr="action=@{/session/enter}" action="#">
				<input type="hidden" id="chatSessionId" name="chatSessionId" th:value="${chatSessionId}">
				<input type="hidden" id="chatSessionUrl" name="chatSessionUrl" th:value="${chatSessionUrl}">
				<label for="name">Your Name</label>
				<input type="text" id="name" name="name" required>
				<label for="language">Language</label>
				<select id="language" name="language" required>
					<option id="sq" value="sq">Albanian</option>
					<option id="ar" value="ar">Arabic</option>
					<option id="hy" value="hy">Armenian</option>
					<option id="bg" value="bg">Bulgarian</option>
					<option id="zh" value="zh">Chinese</option>
					<option id="hr" value="hr">Croatian</option>
					<option id="cs" value="cs">Czech</option>
					<option id="da" value="da">Danish</option>
					<option id="nl" value="nl">Dutch</option>
					<option id="en" value="en">English</option>
					<option id="et" value="et">Estonian</option>
					<option id="fr" value="fr">French</option>
					<option id="fi" value="fi">Finnish</option>
					<option id="de" value="de">German</option>
					<option id="ka" value="ka">Georgian</option>
					<option id="el" value="el">Greek</option>
					<option id="is" value="is">Icelandic</option>
					<option id="id" value="id">Indonesian</option>
					<option id="ga" value="ga">Irish</option>
					<option id="it" value="it">Italian</option>
					<option id="ja" value="ja">Japanese</option>
					<option id="ko" value="ko">Korean</option>
					<option id="la" value="la">Latin</option>
					<option id="mn" value="mn">Mongolian</option>
					<option id="no" value="no">Norwegian</option>
					<option id="fa" value="fa">Persian</option>
					<option id="pl" value="pl">Polish</option>
					<option id="pt" value="pt">Portuguese</option>
					<option id="ru" value="ru">Russian</option>
					<option id="es" value="es">Spanish</option>
					<option id="sv" value="sv">Swedish</option>
					<option id="tr" value="tr">Turkish</option>
					<option id="uk" value="uk">Ukrainian</option>
				</select>
				<label for="url">Chat URL</label>
				<input type="url" id="url" name="url" placeholder="https://example.com">
				<div class="dialog-footer">
					<button type="submit" id="new" disabled>New</button>
					<button type="submit" id="join" disabled>Join</button>
				</div>
			</form>
		</div>
		<script>
			$(document).ready(function() {

				const chatSessionUrlField = $("chatSessionUrl");
				const languageField = $("language");
				const nameField = $("#name");
				const urlField = $("#url");
				const joinButton = $("#join");
				const newButton = $("#new");

				$("#language option").filter(function() {
					const userLanguage = navigator.language.split("-")[0];
					return this.id === userLanguage;
				}).prop("selected", true);

				// Configure Name Field
				nameField.focus();
				nameField.keyup(userInputListener);

				// Configure URL Field
				urlField.keyup(userInputListener);
				const chatSessionUrl = chatSessionUrlField.val();
				if (isNotEmpty(chatSessionUrl)) {
					urlField.val = chatSessionUrl;
					urlField.prop("disabled", true);
				}

				function isNotEmpty(string) {
					return string !== undefined && string.trim().length > 0;
				}

				function userInputListener(event) {

					var name = nameField.val().trim();
					var url = urlField.val().trim();

					//console.log("Username ["+name+"]");
					//console.log("URL ["+url+"]");

					if (name.length > 1 && url.length > 0) {
						joinButton.prop("disabled", false);
						newButton.prop("disabled", true);
					}
					else if (name.length > 1) {
						joinButton.prop("disabled", true);
						newButton.prop("disabled", false);
					}
					else {
						joinButton.prop("disabled", true);
						newButton.prop("disabled", true);
					}
				}
			});
		</script>
	</body>
</html>

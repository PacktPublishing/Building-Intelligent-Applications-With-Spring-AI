# Property configuration for the Deep Thought Spring Boot application.

spring.application.name=Deep Thought

# OpenAI
spring.ai.openai.api-key=
spring.ai.openai.chat.options.model=gpt-5.4-mini

# Google Vertex AI Gemini
spring.ai.google.genai.chat.options.model=gemini-2.5-flash-lite
spring.ai.google.genai.location=us-west1
spring.ai.vertex.ai.gemini.project-id=

# Ollama
spring.ai.ollama.chat.options.model=llama3.2

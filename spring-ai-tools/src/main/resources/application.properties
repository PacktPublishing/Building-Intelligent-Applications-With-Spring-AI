# Property configuration for the Token Metadata Estimator Spring Boot application

spring.application.name=Token Cost Estimator

server.servlet.contextPath=/token-metadata

# Enable Spring's static resource chain so Thymeleaf can rewrite asset URLs
# with a content hash, e.g. /css/main.css -> /css/main-<hash>.css.
spring.web.resources.chain.enabled=true
spring.web.resources.chain.strategy.content.enabled=true
spring.web.resources.chain.strategy.content.paths=/css/**,/js/**

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

	<head>
		<title>Token Cost Estimator</title>
		<meta charset="utf-8">
		<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<link rel="stylesheet" th:href="@{/css/main.css}" href="../static/css/main.css">
		<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
		<script src="https://unpkg.com/htmx.org@2.0.3" integrity="sha384-QWGpdj554B4ETpJJC9z+ZHJcA/i59TyjxEPXiiUgN2WmTyV5OEZWCD6gQhgkdpB/" crossorigin="anonymous"></script>
	</head>

	<body>
		<div class="tokenNavBarContainer">
			<div class="tokenMainNavBarContainer">
				<img th:src="@{/img/SpringLogo.png}" src="../static/img/SpringLogo.png" style="border: 2px solid black; height: 40px; width: 40px; margin: 3px; margin-left: 10px;"/>
				<p class="tokenMainNavBarTitle">Token Cost Estimator</p>
			</div>
			<div class="tokenSubNavBarContainer">
				<p class="tokenSubNavBarTitle">
					<span style="color: #898989;">by Codeprimate, LLC</span>
				</p>
			</div>
		</div>
		<div class="container center">
			<form id="tokenTextForm" action="#" enctype="application/x-www-form-urlencoded">
				<div style="margin: 15px;">
					<textarea id="textContent" placeholder="Enter some text" style="background-color: #f1f3f6; width: 80%; height: 450px; margin: 5px;"></textarea>
				</div>
			</form>
		</div>
		<div class="horizontal-separator"></div>
		<div class="tokenizer-stats-container center">
			<div class="tokenizer-stat vertical-separators">
				<div class="tokenizer-stat-title tokenSubNavBarTitle">WORD COUNT</div>
				<div class="tokenizer-stat-value">0</div>
			</div>
			<div class="tokenizer-stat vertical-separators">
				<div class="tokenizer-stat-title tokenSubNavBarTitle">TOKEN COUNT</div>
				<div class="tokenizer-stat-value">0</div>
			</div>
			<div class="tokenizer-stat vertical-separators">
				<div class="tokenizer-stat-title tokenSubNavBarTitle">FILTERED TOKEN COUNT</div>
				<div class="tokenizer-stat-value">0</div>
			</div>
		</div>
		<div class="horizontal-separator"></div>
		<script type="text/javascript">
			$(document).ready(function() {
				$("#textContent").focus();
			});
		</script>
	</body>

</html>
